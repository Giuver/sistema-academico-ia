services:
  - type: web
    name: sistema-academico-ml-api
    env: python
    region: oregon
    plan: free
    branch: main
    rootDir: ml-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        value: https://qqtzfdrhgyyicrrkowvi.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        fromGroup: port
      - key: LOG_LEVEL
        value: INFO
      - key: MODEL_PATH
        value: app/models/trained
      - key: REPORTS_OUTPUT_DIR
        value: reports
      - key: CORS_ORIGINS
        value: https://sistema-academico-ia.vercel.app,http://localhost:5173
